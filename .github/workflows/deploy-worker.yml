name: Deploy Worker

on:
  push:
    branches: [ main, master ]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for git subtree/push

      - name: Prepare Deployment Directory
        run: |
          # Create a temporary directory for the HF repo content
          mkdir -p hf_deploy
          
          # Copy worker contents to the deployment directory
          cp -r worker/* hf_deploy/
          
          # Ensure entrypoint.sh is executable
          chmod +x hf_deploy/entrypoint.sh

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_SPACE_ID }} # username/space-name
        run: |
          if [ -z "$HF_TOKEN" ]; then echo "HF_TOKEN secret is missing"; exit 1; fi
          if [ -z "$HF_REPO" ]; then echo "HF_SPACE_ID secret is missing"; exit 1; fi
          
          cd hf_deploy
          git init
          git config user.name "autodeploy"
          git config user.email "autodeploy@example.com"
          git checkout -b main
          git add .
          git commit -m "Autodeploy: ${GITHUB_SHA}"
          
          # Use the token authentication format for Hugging Face
          git push --force "https://token:$HF_TOKEN@huggingface.co/spaces/$HF_REPO" main
