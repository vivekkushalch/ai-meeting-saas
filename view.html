<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player with Subtitles</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1724;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #f8fafc;
            text-align: center;
            margin-bottom: 24px;
        }

        .upload-section {
            background: #334155;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .file-input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #cbd5e1;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #475569;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            margin-right: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: #2563eb;
        }

        .player-container {
            position: relative;
            width: 100%;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            display: flex;
            flex-direction: column;
        }

        #audioPlayer {
            width: 100%;
            background: #0f172a;
            padding: 16px;
            box-sizing: border-box;
        }

        #subtitleDisplay {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5em;
            text-align: center;
            padding: 20px;
            min-height: 100px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid #334155;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
            flex: 1;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .time-display {
            color: #94a3b8;
            font-family: monospace;
            font-size: 0.9em;
            margin-top: 8px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Audio Player with Subtitles</h1>
        
        <div class="upload-section">
            <div class="file-input-group">
                <label for="audioFile">Audio File</label>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            <div class="file-input-group">
                <label for="subtitleFile">Subtitle File (SRT/VTT)</label>
                <input type="file" id="subtitleFile" accept=".srt,.vtt,text/srt,text/vtt">
            </div>
        </div>

        <div class="player-container">
            <audio id="audioPlayer" controls></audio>
            <div id="subtitleDisplay">Subtitles will appear here</div>
        </div>
        
        <div class="controls">
            <button id="playPauseBtn" disabled>Play</button>
            <button id="restartBtn" disabled>Restart</button>
        </div>
        <div class="time-display">
            <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const audioPlayer = document.getElementById('audioPlayer');
        const audioFileInput = document.getElementById('audioFile');
        const subtitleFileInput = document.getElementById('subtitleFile');
        const subtitleDisplay = document.getElementById('subtitleDisplay');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const currentTimeDisplay = document.getElementById('currentTime');
        const durationDisplay = document.getElementById('duration');

        let subtitles = [];
        let currentSubtitleIndex = -1;

        // Parse SRT or VTT file with improved timing accuracy
        function parseSubtitles(text, format = 'srt') {
            const lines = text.replace(/\r\n?/g, '\n').trim().split('\n\n');
            const subtitles = [];
            const isVTT = format.toLowerCase() === 'vtt';
            
            // Skip VTT header if present
            let startIdx = 0;
            if (isVTT && lines[0].trim().toUpperCase() === 'WEBVTT') {
                startIdx = 1;
            }
            
            for (let i = startIdx; i < lines.length; i++) {
                const block = lines[i];
                if (!block.trim()) continue;
                
                const blockLines = block.split('\n');
                if (blockLines.length < 2) continue;
                
                // For VTT, the first line might be a cue identifier or timestamp
                const firstLine = blockLines[0].trim();
                let lineIndex = 0;
                
                // Skip VTT cue identifier if present
                if (isVTT && !firstLine.includes('-->')) {
                    lineIndex = 1;
                }
                
                const timeLine = blockLines[lineIndex];
                // Try to match both formats: 
                // 1. HH:MM:SS.mmm (with hours)
                // 2. MM:SS.mmm (without hours)
                let timeMatch = timeLine.match(/(\d{2}):(\d{2}):(\d{2})[,.]?(\d{0,3}) *--> *(\d{2}):(\d{2}):(\d{2})[,.]?(\d{0,3})/);
                let hasHours = true;
                
                // If no match, try the format without hours
                if (!timeMatch) {
                    timeMatch = timeLine.match(/(\d{1,2}):(\d{2})[,.]?(\d{0,3}) *--> *(\d{1,2}):(\d{2})[,.]?(\d{0,3})/);
                    hasHours = false;
                    if (!timeMatch) continue;
                }
                
                // Handle both comma and period as decimal separator
                const parseTime = (h, m, s, ms) => {
                    const hh = parseInt(h || '0');
                    const mm = parseInt(m);
                    const ss = s ? parseInt(s) : 0; // s might be undefined for MM:SS.mmm format
                    const mss = ms ? parseInt(ms.padEnd(3, '0')) / 1000 : 0;
                    return hh * 3600 + mm * 60 + ss + mss;
                };
                
                let startTime, endTime;
                
                if (hasHours) {
                    startTime = parseTime(
                        timeMatch[1], timeMatch[2], timeMatch[3], timeMatch[4] || '0'
                    );
                    endTime = parseTime(
                        timeMatch[5], timeMatch[6], timeMatch[7], timeMatch[8] || '0'
                    );
                } else {
                    // For MM:SS.mmm format, hours are 0
                    startTime = parseTime(
                        '0', timeMatch[1], timeMatch[2], timeMatch[3] || '0'
                    );
                    endTime = parseTime(
                        '0', timeMatch[4], timeMatch[5], timeMatch[6] || '0'
                    );
                }
                
                // Get the text content (skip the timestamp line and any cue settings)
                let text = '';
                for (let j = lineIndex + 1; j < blockLines.length; j++) {
                    const line = blockLines[j].trim();
                    if (line && !line.includes('-->') && !line.match(/^<.*>$/)) {
                        text += (text ? '\n' : '') + line;
                    }
                }
                
                if (text) {
                    subtitles.push({
                        index: subtitles.length + 1,
                        startTime,
                        endTime,
                        text
                    });
                }
            }
            
            // Sort subtitles by start time to ensure correct order
            return subtitles.sort((a, b) => a.startTime - b.startTime);
        }

        // Binary search to find the current subtitle efficiently
        function findSubtitleIndex(time) {
            let left = 0;
            let right = subtitles.length - 1;
            
            while (left <= right) {
                const mid = Math.floor((left + right) / 2);
                const subtitle = subtitles[mid];
                
                if (time < subtitle.startTime) {
                    right = mid - 1;
                } else if (time > subtitle.endTime) {
                    left = mid + 1;
                } else {
                    return mid; // Found matching subtitle
                }
            }
            
            return -1; // No subtitle found for current time
        }

        // Update current subtitle based on audio time
        function updateSubtitle() {
            if (!audioPlayer.paused) {
                const time = audioPlayer.currentTime;
                const newIndex = findSubtitleIndex(time);
                
                // Only update the DOM if the subtitle has changed
                if (newIndex !== currentSubtitleIndex) {
                    currentSubtitleIndex = newIndex;
                    subtitleDisplay.textContent = currentSubtitleIndex >= 0 
                        ? subtitles[currentSubtitleIndex].text 
                        : '';
                }
                
                // Update time display
                updateTimeDisplay();
                
                // Schedule next update
                requestAnimationFrame(updateSubtitle);
            }
        }

        // Format time as MM:SS
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Update time display
        function updateTimeDisplay() {
            if (audioPlayer.duration) {
                currentTimeDisplay.textContent = formatTime(audioPlayer.currentTime);
                durationDisplay.textContent = formatTime(audioPlayer.duration);
            }
        }

        // Event Listeners
        audioFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                audioPlayer.src = url;
                playPauseBtn.disabled = false;
                restartBtn.disabled = false;
            }
        });

        subtitleFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const fileExt = file.name.split('.').pop().toLowerCase();
                    const format = fileExt === 'vtt' ? 'vtt' : 'srt';
                    subtitles = parseSubtitles(e.target.result, format);
                    console.log(`Loaded ${format.toUpperCase()} subtitles:`, subtitles);
                };
                reader.readAsText(file);
            }
        });

        playPauseBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = 'Pause';
                updateSubtitle(); // Start subtitle updates
            } else {
                audioPlayer.pause();
                playPauseBtn.textContent = 'Play';
            }
        });

        restartBtn.addEventListener('click', () => {
            audioPlayer.currentTime = 0;
            if (audioPlayer.paused) {
                audioPlayer.play();
                playPauseBtn.textContent = 'Pause';
            }
        });

        audioPlayer.addEventListener('play', () => {
            playPauseBtn.textContent = 'Pause';
            updateSubtitle(); // Start subtitle updates when playing
            
            // Force an immediate update of the current subtitle
            const time = audioPlayer.currentTime;
            currentSubtitleIndex = findSubtitleIndex(time);
            subtitleDisplay.textContent = currentSubtitleIndex >= 0 
                ? subtitles[currentSubtitleIndex].text 
                : '';
        });

        audioPlayer.addEventListener('pause', () => {
            playPauseBtn.textContent = 'Play';
        });

        // More frequent time updates for better sync
        audioPlayer.addEventListener('timeupdate', () => {
            updateTimeDisplay();
            
            // If we're near a subtitle boundary, force an update
            if (!audioPlayer.paused && subtitles.length > 0) {
                const time = audioPlayer.currentTime;
                // Check if we're within 100ms of any subtitle boundary
                const nearBoundary = subtitles.some(sub => 
                    Math.abs(time - sub.start) < 0.1 || 
                    Math.abs(time - sub.end) < 0.1
                );
                
                if (nearBoundary) {
                    const newIndex = findSubtitleIndex(time);
                    if (newIndex !== currentSubtitleIndex) {
                        currentSubtitleIndex = newIndex;
                        subtitleDisplay.textContent = currentSubtitleIndex >= 0 
                            ? subtitles[currentSubtitleIndex].text 
                            : '';
                    }
                }
            }
        });
    </script>
</body>
</html>
